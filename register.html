{% extends "base.html" %} {% block title %}Registration | LastBit{% endblock %}
{% block content %}
<div class="dashboard-container p-4">
  <div class="card mx-auto shadow-lg" style="max-width: 600px">
    <div class="card-body">
      <h3 class="card-title text-center mb-3">Create Your Account</h3>

      <form method="POST">
        <div class="mb-3">
          <label for="role" class="form-label">Account Type</label>
          <select
            class="form-select"
            name="role"
            id="role"
            required
            onchange="toggleFields()"
          >
            <option value="">-- Select Role --</option>
            <option value="seeker">Job Seeker</option>
            <option value="employer">Employer</option>
          </select>
        </div>

        <div id="applicantFields" style="display: none">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" />
          </div>
        </div>

        <div id="employerFields" style="display: none">
          <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company_name" class="form-control" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>

        <p class="text-center mt-3">
          Already have an account?
          <a href="{{ url_for('login') }}">Login here</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  function toggleFields() {
    let role = document.getElementById("role").value;
    document.getElementById("applicantFields").style.display =
      role === "applicant" ? "block" : "none";
    document.getElementById("employerFields").style.display =
      role === "employer" ? "block" : "none";
  }
</script>
{% endblock %}
