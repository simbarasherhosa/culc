{% extends "base.html" %} {% block title %}Server Error | LastBit{% endblock %}
{% block content %}
<div class="dashboard-container p-4">
  <div class="header-card text-center">
    <h1><i class="fas fa-server me-2"></i>500 - Server Error</h1>
    <p class="welcome-text">Something went wrong on our end.</p>
  </div>

  <div class="section-card text-center">
    <i class="fas fa-cogs fa-5x text-muted mb-4"></i>
    <h3>Oops! Something went wrong.</h3>
    <p class="text-muted mb-4">
      We're experiencing some technical difficulties. Please try again later.
    </p>
    <div class="d-flex justify-content-center gap-3">
      <a
        href="{{ url_for('index') }}"
        class="btn btn-primary-modern btn-modern"
      >
        <i class="fas fa-home me-2"></i>Go Home
      </a>
      <button
        onclick="location.reload()"
        class="btn btn-outline-modern btn-modern"
      >
        <i class="fas fa-redo me-2"></i>Try Again
      </button>
    </div>
  </div>
</div>
{% endblock %}
